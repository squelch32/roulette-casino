<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Casino · Home</title>
    <link rel="icon" type="image/png" href="roulette/roulette%20favicon.png" />
    <link rel="stylesheet" href="home.css" />
  </head>
  <body>
    <main class="home">
      <header class="home-header">
        <h1>casino</h1>
        <p class="home-tagline">welcome, choose a game from the 6 games below</p>
      </header>

      <nav class="game-grid" aria-label="Choose a game">
        <a class="game-card game-card--live" href="roulette/">
          <span class="game-name">roulette</span>
          <span class="game-art" aria-hidden="true">
            <img class="game-icon" src="roulette%20icon.png" alt="" width="120" height="120" />
          </span>
        </a>

        <a class="game-card game-card--live" href="blackjack/">
          <span class="game-name">blackjack</span>
          <span class="game-art" aria-hidden="true">
            <img class="game-icon" src="blackjack%20icon.png" alt="" width="120" height="100" />
          </span>
        </a>

        <div class="game-card game-card--soon" aria-disabled="true">
          <span class="game-name">slots</span>
          <span class="game-art" aria-hidden="true">
            <img class="game-icon" src="slot%20machine%20icon.png" alt="" width="120" height="100" />
          </span>
          <span class="coming-soon">coming soon</span>
        </div>

        <div class="game-card game-card--soon" aria-disabled="true">
          <span class="game-name">keno</span>
          <span class="game-art" aria-hidden="true">
            <img class="game-icon" src="keno%20icon.png" alt="" width="120" height="100" />
          </span>
          <span class="coming-soon">coming soon</span>
        </div>

        <div class="game-card game-card--soon" aria-disabled="true">
          <span class="game-name">craps</span>
          <span class="game-art" aria-hidden="true">
            <img class="game-icon" src="craps%20icon.png" alt="" width="120" height="100" />
          </span>
          <span class="coming-soon">coming soon</span>
        </div>

        <div class="game-card game-card--soon" aria-disabled="true">
          <span class="game-name">high-low</span>
          <span class="game-art" aria-hidden="true">
            <img class="game-icon" src="high-low%20icon.png" alt="" width="120" height="100" />
          </span>
          <span class="coming-soon">coming soon</span>
        </div>
      </nav>
    </main>
  </body>
</html>
